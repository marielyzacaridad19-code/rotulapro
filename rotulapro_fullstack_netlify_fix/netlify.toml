[build]
  publish = "frontend"
  functions = "netlify/functions"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "serverless-http", "@supabase/supabase-js", "bcryptjs", "jsonwebtoken", "zod", "resend", "openai", "cheerio", "cors", "helmet"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
